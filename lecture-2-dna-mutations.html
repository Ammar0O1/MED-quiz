<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>DNA Mutations — Quiz</title>
<style>
  :root{
    --ink:#0a0e14; --ink-2:#0f1620; --panel:#121b28; --panel-2:#16212f;
    --line:#1f2d3f; --line-2:#293a50;
    --text:#e6edf5; --muted:#8598ad; --faint:#5a6b82;
    --accent:#f472b6; --accent-2:#ec4899; --accent-soft:rgba(244,114,182,0.12);
    --good:#34d399; --good-soft:rgba(52,211,153,0.14); --good-line:rgba(52,211,153,0.5);
    --bad:#f87171; --bad-soft:rgba(248,113,113,0.13); --bad-line:rgba(248,113,113,0.5);
    --gold:#fbbf24;
    --mono:'SF Mono',ui-monospace,'Cascadia Code','JetBrains Mono',Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html{-webkit-text-size-adjust:100%;}
  body{
    margin:0;background:var(--ink);color:var(--text);font-family:var(--sans);
    line-height:1.55;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    background-image:radial-gradient(1200px 600px at 80% -10%,rgba(56,189,248,0.06),transparent 60%),radial-gradient(900px 500px at -10% 110%,rgba(56,189,248,0.05),transparent 60%);
  }
  .wrap{max-width:820px;margin:0 auto;padding:22px 18px 96px;}

  /* top bar */
  .top{display:flex;align-items:center;gap:14px;margin-bottom:20px;flex-wrap:wrap;}
  .back{
    display:inline-flex;align-items:center;gap:8px;text-decoration:none;color:var(--muted);
    font-family:var(--mono);font-size:13px;padding:9px 14px;border:1px solid var(--line);
    border-radius:11px;background:var(--panel);transition:.15s;
  }
  .back:active{background:var(--panel-2);}
  .eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.16em;color:var(--accent);
    text-transform:uppercase;border:1px solid var(--line-2);padding:6px 12px;border-radius:20px;background:var(--accent-soft);}

  h1{font-family:var(--mono);font-size:clamp(26px,6vw,38px);font-weight:700;letter-spacing:-.01em;
    margin:6px 0 6px;line-height:1.1;}
  .sub{color:var(--muted);font-size:15px;margin:0 0 22px;max-width:60ch;}

  /* progress */
  .progress-wrap{position:sticky;top:8px;z-index:20;margin-bottom:26px;}
  .progress-card{background:rgba(15,22,32,0.82);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    border:1px solid var(--line);border-radius:14px;padding:12px 16px;display:flex;align-items:center;gap:14px;}
  .progress-meta{font-family:var(--mono);font-size:12.5px;color:var(--muted);white-space:nowrap;}
  .progress-meta b{color:var(--text);}
  .bar{flex:1;height:7px;background:var(--ink-2);border-radius:99px;overflow:hidden;border:1px solid var(--line);}
  .bar > i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--accent-2),var(--accent));
    border-radius:99px;transition:width .35s cubic-bezier(.4,0,.2,1);}
  .score-pill{font-family:var(--mono);font-size:12.5px;color:var(--good);white-space:nowrap;}

  /* question card */
  .q{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:20px 18px;margin-bottom:16px;
    scroll-margin-top:90px;}
  .q-head{display:flex;gap:12px;align-items:baseline;margin-bottom:14px;}
  .q-num{font-family:var(--mono);font-size:13px;color:var(--accent);font-weight:700;flex:none;
    border:1px solid var(--line-2);background:var(--accent-soft);border-radius:8px;padding:3px 9px;min-width:44px;text-align:center;}
  .q-text{font-size:16.5px;font-weight:600;line-height:1.5;letter-spacing:-.005em;}
  .opts{display:flex;flex-direction:column;gap:9px;margin-top:4px;}
  .opt{
    display:flex;gap:12px;align-items:flex-start;text-align:left;width:100%;
    background:var(--panel-2);border:1px solid var(--line);border-radius:12px;
    padding:14px 15px;color:var(--text);font-size:15.5px;font-family:inherit;line-height:1.45;
    cursor:pointer;transition:border-color .15s,background .15s,transform .06s;
  }
  .opt:active{transform:scale(.994);}
  @media(hover:hover){.opt:not(:disabled):hover{border-color:var(--accent-2);background:var(--panel);}}
  .opt .tag{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--muted);flex:none;
    width:24px;height:24px;border-radius:7px;border:1px solid var(--line-2);display:flex;align-items:center;justify-content:center;margin-top:1px;}
  .opt .txt{flex:1;}
  .opt:disabled{cursor:default;}
  .opt.correct{background:var(--good-soft);border-color:var(--good-line);}
  .opt.correct .tag{color:var(--good);border-color:var(--good-line);background:var(--good-soft);}
  .opt.wrong{background:var(--bad-soft);border-color:var(--bad-line);}
  .opt.wrong .tag{color:var(--bad);border-color:var(--bad-line);background:var(--bad-soft);}
  .opt .mark{margin-left:auto;font-family:var(--mono);font-size:13px;font-weight:700;flex:none;align-self:center;}
  .opt.correct .mark{color:var(--good);}
  .opt.wrong .mark{color:var(--bad);}

  .explain{margin-top:13px;border-left:3px solid var(--accent-2);background:var(--ink-2);
    border-radius:0 10px 10px 0;padding:12px 15px;font-size:14.5px;color:var(--muted);display:none;}
  .explain.show{display:block;animation:fade .25s ease;}
  .explain b{color:var(--text);font-weight:600;}
  @keyframes fade{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:none}}

  /* result */
  .result{background:linear-gradient(160deg,var(--panel),var(--ink-2));border:1px solid var(--line-2);
    border-radius:18px;padding:30px 22px;text-align:center;margin-top:8px;display:none;}
  .result.show{display:block;animation:fade .3s ease;}
  .result .verdict{font-family:var(--mono);font-size:14px;letter-spacing:.14em;text-transform:uppercase;margin-bottom:8px;}
  .result.pass .verdict{color:var(--good);}
  .result.fail .verdict{color:var(--gold);}
  .result .big{font-family:var(--mono);font-size:56px;font-weight:700;line-height:1;margin:6px 0;}
  .result .detail{color:var(--muted);font-size:15px;margin-bottom:20px;}
  .result .actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
  .btn{font-family:var(--mono);font-size:14px;padding:12px 20px;border-radius:11px;border:1px solid var(--line-2);
    background:var(--panel-2);color:var(--text);cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:8px;transition:.15s;}
  .btn:active{transform:scale(.97);}
  .btn.primary{background:var(--accent-2);border-color:var(--accent);color:#04121c;font-weight:700;}

  .submit-row{margin-top:8px;text-align:center;}
  .submit-btn{font-family:var(--mono);font-size:15px;font-weight:700;padding:15px 30px;border-radius:13px;
    border:1px solid var(--accent);background:var(--accent-2);color:#04121c;cursor:pointer;transition:.15s;width:100%;max-width:340px;}
  .submit-btn:disabled{opacity:.4;cursor:not-allowed;}
  .submit-btn:not(:disabled):active{transform:scale(.98);}
  .hint{font-family:var(--mono);font-size:12.5px;color:var(--faint);margin-top:12px;}

  @media(min-width:768px){
    .wrap{padding:34px 26px 110px;}
    .q{padding:24px 24px;}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <a class="back" href="index.html">&larr; All lectures</a>
    <span class="eyebrow">Lecture 02 · Molecular Genetics</span>
  </div>
  <h1>DNA Mutations</h1>
  <p class="sub">Point mutations, silent/missense/nonsense, frameshifts, repeat disorders, and microsatellite instability. Tap an answer to lock it in and see instant feedback.</p>

  <div class="progress-wrap">
    <div class="progress-card">
      <span class="progress-meta"><b id="answered">0</b>/<span id="total">0</span> answered</span>
      <div class="bar"><i id="barfill"></i></div>
      <span class="score-pill" id="scorepill">0 correct</span>
    </div>
  </div>

  <div id="quiz"></div>

  <div class="submit-row" id="submitRow">
    <button class="submit-btn" id="submitBtn" disabled>Finish &amp; see score</button>
    <div class="hint" id="hint">Answer all questions to finish</div>
  </div>

  <div class="result" id="result">
    <div class="verdict" id="verdict"></div>
    <div class="big" id="bigscore"></div>
    <div class="detail" id="resultDetail"></div>
    <div class="actions">
      <button class="btn primary" onclick="retry()">Try again</button>
      <a class="btn" href="index.html">Back to lectures</a>
    </div>
  </div>
</div>

<script>
/* ===== Question bank =====
   answer = index of correct option. Options are shuffled at render so position carries no signal. */
const QUESTIONS = [
  {
    "q": "What distinguishes a germline mutation from a somatic mutation?",
    "options": [
      "Germline mutations occur in sperm/eggs and are passed to offspring; somatic mutations are acquired and not inherited",
      "Germline mutations are acquired during life; somatic mutations are present in eggs and sperm",
      "Germline mutations affect only one cell; somatic mutations affect every cell in the body",
      "Germline mutations are always harmful; somatic mutations are always silent"
    ],
    "answer": 0,
    "e": "Germline mutations are in the gametes, so they appear in every cell of the offspring; somatic mutations arise in body cells during life and are not transmitted."
  },
  {
    "q": "A transition point mutation is best described as:",
    "options": [
      "A purine replaced by a purine, or a pyrimidine by a pyrimidine",
      "A purine replaced by a pyrimidine, or vice versa",
      "Any insertion of a single nucleotide",
      "The deletion of three consecutive bases"
    ],
    "answer": 0,
    "e": "Transitions swap like-for-like ring structures (purine↔purine, e.g. A→G; or pyrimidine↔pyrimidine, e.g. C→T). They are the more common point mutation."
  },
  {
    "q": "A transversion point mutation involves:",
    "options": [
      "A purine replaced by a pyrimidine, or a pyrimidine by a purine",
      "A purine replaced by another purine",
      "A pyrimidine replaced by another pyrimidine",
      "Loss of an amino group from a base"
    ],
    "answer": 0,
    "e": "Transversions swap ring types — a two-ring purine for a single-ring pyrimidine (e.g. A→T) or the reverse. They are less common than transitions."
  },
  {
    "q": "Which pair correctly lists the purines?",
    "options": [
      "Adenine and guanine",
      "Cytosine and thymine",
      "Adenine and cytosine",
      "Guanine and thymine"
    ],
    "answer": 0,
    "e": "Purines (two-ring bases) are adenine and guanine; the pyrimidines (single-ring) are cytosine, thymine, and uracil."
  },
  {
    "q": "A silent mutation typically occurs in which position of a codon, and why does it not change the protein?",
    "options": [
      "The third position; the new codon still specifies the same amino acid",
      "The first position; the ribosome skips altered first bases",
      "The second position; the second base is never read",
      "Any position, because all substitutions are tolerated"
    ],
    "answer": 0,
    "e": "Because of degeneracy (wobble), changes at the 3rd codon position often encode the same amino acid, so the protein is unchanged."
  },
  {
    "q": "A nonsense mutation produces which outcome?",
    "options": [
      "A premature stop codon that truncates the protein",
      "A codon specifying a different amino acid",
      "A codon specifying the same amino acid",
      "A shift in the entire downstream reading frame"
    ],
    "answer": 0,
    "e": "A nonsense mutation converts an amino-acid codon into a stop codon (UGA, UAA, or UAG), ending translation early."
  },
  {
    "q": "Which set correctly lists the three stop codons?",
    "options": [
      "UGA, UAA, UAG",
      "AUG, UGG, UAC",
      "UUU, CCC, GGG",
      "UAC, AUG, CAU"
    ],
    "answer": 0,
    "e": "UGA, UAA, and UAG are the termination codons; they do not code for an amino acid and signal the ribosome to stop."
  },
  {
    "q": "A missense mutation results in:",
    "options": [
      "A codon that specifies a different amino acid",
      "A codon that specifies the same amino acid",
      "A premature stop codon",
      "A change in the number of nucleotides in the gene"
    ],
    "answer": 0,
    "e": "A missense mutation is a substitution that changes one amino acid in the protein, potentially altering its function."
  },
  {
    "q": "Sickle cell anemia is caused by which specific molecular change in the beta-globin gene?",
    "options": [
      "A single base substitution in the 6th codon, replacing glutamate with valine",
      "A three-base deletion causing loss of phenylalanine",
      "A frameshift producing a truncated beta chain",
      "A trinucleotide repeat expansion in the beta gene"
    ],
    "answer": 0,
    "e": "It's a missense mutation: one base change at the 6th codon of the β-globin gene substitutes valine for glutamate."
  },
  {
    "q": "The ΔF508 mutation in cystic fibrosis is an example of which type of mutation?",
    "options": [
      "A deletion of three DNA bases causing loss of phenylalanine",
      "A single-base substitution creating a stop codon",
      "A transition altering one amino acid",
      "A trinucleotide repeat expansion"
    ],
    "answer": 0,
    "e": "ΔF508 deletes three bases, removing a single phenylalanine residue and causing abnormal folding of the CFTR protein."
  },
  {
    "q": "What defines a frameshift mutation?",
    "options": [
      "An insertion or deletion of bases not in a multiple of three, shifting the reading frame",
      "Any single-base substitution that changes an amino acid",
      "A deletion of exactly three bases",
      "A substitution occurring in the third codon position"
    ],
    "answer": 0,
    "e": "Adding or removing bases in numbers not divisible by three shifts the reading frame, garbling every codon downstream."
  },
  {
    "q": "Why does a three-base deletion (like ΔF508) NOT cause a frameshift, whereas a two-base deletion does?",
    "options": [
      "Removing a multiple of three keeps the downstream reading frame intact",
      "Three-base deletions occur only in introns",
      "Two-base deletions are always repaired before translation",
      "The ribosome automatically ignores deletions of three bases"
    ],
    "answer": 0,
    "e": "The reading frame is read in triplets; removing a multiple of three keeps codon grouping intact downstream, so only one residue is lost."
  },
  {
    "q": "A frameshift that removes the stop codon would most likely produce:",
    "options": [
      "An abnormally elongated protein",
      "A protein of exactly normal length",
      "A protein missing only one amino acid",
      "No protein at all"
    ],
    "answer": 0,
    "e": "Losing the stop codon means translation continues past the normal end, yielding an elongated protein; an early stop instead gives a truncated one."
  },
  {
    "q": "Becker muscular dystrophy is generally milder than Duchenne muscular dystrophy because:",
    "options": [
      "Its mutations often preserve the reading frame, allowing partially functional dystrophin",
      "It affects a different gene entirely",
      "It is a silent mutation with no protein change",
      "It results from a trinucleotide repeat rather than a deletion"
    ],
    "answer": 0,
    "e": "Duchenne frameshift deletions abolish functional dystrophin, whereas Becker mutations frequently keep the frame, producing a shortened but partly working protein."
  },
  {
    "q": "Slipped-strand mispairing (DNA slippage) tends to occur where?",
    "options": [
      "In regions of repeated nucleotide sequences, especially with inadequate mismatch repair",
      "Only at origins of replication",
      "Exclusively within stop codons",
      "At sites of double-strand breaks"
    ],
    "answer": 0,
    "e": "Repeated sequences let the strands misalign during replication; without good mismatch repair this yields insertions or deletions (frameshifts)."
  },
  {
    "q": "During DNA slippage, slippage in the template strand versus the newly replicated strand produces, respectively:",
    "options": [
      "A deletion versus an insertion",
      "An insertion versus a deletion",
      "A transition versus a transversion",
      "A silent versus a nonsense mutation"
    ],
    "answer": 0,
    "e": "If the template loops out, that region isn't copied → deletion; if the new strand loops out, it gains extra bases → insertion."
  },
  {
    "q": "Trinucleotide repeat disorders arise from:",
    "options": [
      "Expansion of repeated three-base units within a gene",
      "A single missense substitution",
      "Deletion of a whole exon",
      "Deamination of cytosine to uracil"
    ],
    "answer": 0,
    "e": "Extra copies of a repeated triplet (e.g. CAG) accumulate in the gene and cause disease when the repeat number crosses a threshold."
  },
  {
    "q": "Which of the following is a classic trinucleotide repeat disorder?",
    "options": [
      "Huntington's disease",
      "Sickle cell anemia",
      "Cystic fibrosis",
      "Xeroderma pigmentosum"
    ],
    "answer": 0,
    "e": "Huntington's (along with Fragile X, Friedreich's ataxia, and myotonic dystrophy) is caused by trinucleotide repeat expansion."
  },
  {
    "q": "What is a microsatellite?",
    "options": [
      "A short segment of DNA with a repeated sequence (e.g. CACACACA)",
      "A gene encoding a small regulatory RNA",
      "A three-base stop signal",
      "A region of the mitochondrial genome"
    ],
    "answer": 0,
    "e": "Microsatellites are short tandem-repeated DNA stretches scattered through the genome; their stability depends on mismatch repair."
  },
  {
    "q": "Microsatellite instability is a hallmark of which condition, and results from failure of what system?",
    "options": [
      "Colon cancer (e.g. Lynch syndrome); failure of mismatch repair enzymes",
      "Sickle cell anemia; failure of base excision repair",
      "Cystic fibrosis; failure of nucleotide excision repair",
      "Duchenne dystrophy; failure of double-strand break repair"
    ],
    "answer": 0,
    "e": "When mismatch repair fails, microsatellites randomly expand/contract among cells — a hallmark seen in certain colon cancers such as Lynch syndrome."
  },
  {
    "q": "In the central dogma, a codon is defined as:",
    "options": [
      "A sequence of three nucleotides specifying one amino acid",
      "A single nucleotide read by the ribosome",
      "A stretch of DNA that binds RNA polymerase",
      "The repeated unit in a microsatellite"
    ],
    "answer": 0,
    "e": "A codon is a triplet of nucleotides in mRNA that codes for a specific amino acid (or a stop signal)."
  },
  {
    "q": "Compared with a point mutation, a frameshift mutation generally has what effect on the DNA and protein?",
    "options": [
      "It changes the DNA length and can alter many downstream amino acids",
      "It keeps DNA length unchanged and alters at most one amino acid",
      "It always produces a silent, unchanged protein",
      "It affects only the mitochondrial genome"
    ],
    "answer": 0,
    "e": "Point substitutions leave length unchanged and affect a single codon; insertions/deletions change length and scramble all downstream codons."
  }
];
</script>

<script>
/* ===== Quiz engine ===== */
(function(){
  const bank = QUESTIONS.map(q=>({...q}));
  const quizEl = document.getElementById('quiz');
  const totalEl = document.getElementById('total');
  const answeredEl = document.getElementById('answered');
  const scorepillEl = document.getElementById('scorepill');
  const barfill = document.getElementById('barfill');
  const submitBtn = document.getElementById('submitBtn');
  const submitRow = document.getElementById('submitRow');
  const hint = document.getElementById('hint');
  const resultEl = document.getElementById('result');
  const LETTERS = ['A','B','C','D','E','F'];
  const PASS = 70;

  let state = [];

  function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

  function build(){
    quizEl.innerHTML='';
    state = bank.map(()=>({answered:false,correct:false}));
    totalEl.textContent = bank.length;

    bank.forEach((item,qi)=>{
      // shuffle options, track correct index
      const order = shuffle(item.options.map((t,idx)=>({t,idx})));
      const correctPos = order.findIndex(o=>o.idx===item.answer);

      const card = document.createElement('div');
      card.className='q';
      card.id='q'+qi;

      const head = document.createElement('div');
      head.className='q-head';
      head.innerHTML = `<span class="q-num">Q${String(qi+1).padStart(2,'0')}</span><span class="q-text"></span>`;
      head.querySelector('.q-text').textContent = item.q;
      card.appendChild(head);

      const opts = document.createElement('div');
      opts.className='opts';
      order.forEach((o,pos)=>{
        const b = document.createElement('button');
        b.className='opt';
        b.innerHTML = `<span class="tag">${LETTERS[pos]}</span><span class="txt"></span><span class="mark"></span>`;
        b.querySelector('.txt').textContent = o.t;
        b.addEventListener('click',()=>choose(qi,pos,correctPos,opts,exp));
        opts.appendChild(b);
      });
      card.appendChild(opts);

      const exp = document.createElement('div');
      exp.className='explain';
      exp.innerHTML = `<b>Why:</b> ${item.e}`;
      card.appendChild(exp);

      quizEl.appendChild(card);
    });
    update();
  }

  function choose(qi,pos,correctPos,optsEl,expEl){
    if(state[qi].answered) return;
    state[qi].answered=true;
    state[qi].correct = (pos===correctPos);
    const buttons=[...optsEl.children];
    buttons.forEach((b,i)=>{
      b.disabled=true;
      if(i===correctPos){b.classList.add('correct');b.querySelector('.mark').textContent='✓';}
      if(i===pos && pos!==correctPos){b.classList.add('wrong');b.querySelector('.mark').textContent='✗';}
    });
    expEl.classList.add('show');
    update();
  }

  function update(){
    const answered = state.filter(s=>s.answered).length;
    const correct = state.filter(s=>s.correct).length;
    answeredEl.textContent = answered;
    scorepillEl.textContent = correct+' correct';
    barfill.style.width = (answered/bank.length*100)+'%';
    const done = answered===bank.length;
    submitBtn.disabled = !done;
    hint.textContent = done ? 'All answered — lock in your score' : (bank.length-answered)+' left';
  }

  submitBtn.addEventListener('click',()=>{
    const correct = state.filter(s=>s.correct).length;
    const pct = Math.round(correct/bank.length*100);
    const pass = pct>=PASS;
    resultEl.className='result show '+(pass?'pass':'fail');
    document.getElementById('verdict').textContent = pass?'Pass':'Keep reviewing';
    document.getElementById('bigscore').textContent = pct+'%';
    document.getElementById('resultDetail').textContent =
      `${correct} of ${bank.length} correct · passing mark is ${PASS}%`;
    submitRow.style.display='none';
    resultEl.scrollIntoView({behavior:'smooth',block:'center'});
  });

  window.retry=function(){
    resultEl.className='result';
    submitRow.style.display='';
    build();
    window.scrollTo({top:0,behavior:'smooth'});
  };

  build();
})();
</script>
</body>
</html>
