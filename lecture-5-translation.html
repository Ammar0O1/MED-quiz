<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Translation — Quiz</title>
<style>
  :root{
    --ink:#0a0e14; --ink-2:#0f1620; --panel:#121b28; --panel-2:#16212f;
    --line:#1f2d3f; --line-2:#293a50;
    --text:#e6edf5; --muted:#8598ad; --faint:#5a6b82;
    --accent:#fbbf24; --accent-2:#f59e0b; --accent-soft:rgba(251,191,36,0.12);
    --good:#34d399; --good-soft:rgba(52,211,153,0.14); --good-line:rgba(52,211,153,0.5);
    --bad:#f87171; --bad-soft:rgba(248,113,113,0.13); --bad-line:rgba(248,113,113,0.5);
    --gold:#fbbf24;
    --mono:'SF Mono',ui-monospace,'Cascadia Code','JetBrains Mono',Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html{-webkit-text-size-adjust:100%;}
  body{
    margin:0;background:var(--ink);color:var(--text);font-family:var(--sans);
    line-height:1.55;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    background-image:radial-gradient(1200px 600px at 80% -10%,rgba(56,189,248,0.06),transparent 60%),radial-gradient(900px 500px at -10% 110%,rgba(56,189,248,0.05),transparent 60%);
  }
  .wrap{max-width:820px;margin:0 auto;padding:22px 18px 96px;}

  /* top bar */
  .top{display:flex;align-items:center;gap:14px;margin-bottom:20px;flex-wrap:wrap;}
  .back{
    display:inline-flex;align-items:center;gap:8px;text-decoration:none;color:var(--muted);
    font-family:var(--mono);font-size:13px;padding:9px 14px;border:1px solid var(--line);
    border-radius:11px;background:var(--panel);transition:.15s;
  }
  .back:active{background:var(--panel-2);}
  .eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.16em;color:var(--accent);
    text-transform:uppercase;border:1px solid var(--line-2);padding:6px 12px;border-radius:20px;background:var(--accent-soft);}

  h1{font-family:var(--mono);font-size:clamp(26px,6vw,38px);font-weight:700;letter-spacing:-.01em;
    margin:6px 0 6px;line-height:1.1;}
  .sub{color:var(--muted);font-size:15px;margin:0 0 22px;max-width:60ch;}

  /* progress */
  .progress-wrap{position:sticky;top:8px;z-index:20;margin-bottom:26px;}
  .progress-card{background:rgba(15,22,32,0.82);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    border:1px solid var(--line);border-radius:14px;padding:12px 16px;display:flex;align-items:center;gap:14px;}
  .progress-meta{font-family:var(--mono);font-size:12.5px;color:var(--muted);white-space:nowrap;}
  .progress-meta b{color:var(--text);}
  .bar{flex:1;height:7px;background:var(--ink-2);border-radius:99px;overflow:hidden;border:1px solid var(--line);}
  .bar > i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--accent-2),var(--accent));
    border-radius:99px;transition:width .35s cubic-bezier(.4,0,.2,1);}
  .score-pill{font-family:var(--mono);font-size:12.5px;color:var(--good);white-space:nowrap;}

  /* question card */
  .q{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:20px 18px;margin-bottom:16px;
    scroll-margin-top:90px;}
  .q-head{display:flex;gap:12px;align-items:baseline;margin-bottom:14px;}
  .q-num{font-family:var(--mono);font-size:13px;color:var(--accent);font-weight:700;flex:none;
    border:1px solid var(--line-2);background:var(--accent-soft);border-radius:8px;padding:3px 9px;min-width:44px;text-align:center;}
  .q-text{font-size:16.5px;font-weight:600;line-height:1.5;letter-spacing:-.005em;}
  .opts{display:flex;flex-direction:column;gap:9px;margin-top:4px;}
  .opt{
    display:flex;gap:12px;align-items:flex-start;text-align:left;width:100%;
    background:var(--panel-2);border:1px solid var(--line);border-radius:12px;
    padding:14px 15px;color:var(--text);font-size:15.5px;font-family:inherit;line-height:1.45;
    cursor:pointer;transition:border-color .15s,background .15s,transform .06s;
  }
  .opt:active{transform:scale(.994);}
  @media(hover:hover){.opt:not(:disabled):hover{border-color:var(--accent-2);background:var(--panel);}}
  .opt .tag{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--muted);flex:none;
    width:24px;height:24px;border-radius:7px;border:1px solid var(--line-2);display:flex;align-items:center;justify-content:center;margin-top:1px;}
  .opt .txt{flex:1;}
  .opt:disabled{cursor:default;}
  .opt.correct{background:var(--good-soft);border-color:var(--good-line);}
  .opt.correct .tag{color:var(--good);border-color:var(--good-line);background:var(--good-soft);}
  .opt.wrong{background:var(--bad-soft);border-color:var(--bad-line);}
  .opt.wrong .tag{color:var(--bad);border-color:var(--bad-line);background:var(--bad-soft);}
  .opt .mark{margin-left:auto;font-family:var(--mono);font-size:13px;font-weight:700;flex:none;align-self:center;}
  .opt.correct .mark{color:var(--good);}
  .opt.wrong .mark{color:var(--bad);}

  .explain{margin-top:13px;border-left:3px solid var(--accent-2);background:var(--ink-2);
    border-radius:0 10px 10px 0;padding:12px 15px;font-size:14.5px;color:var(--muted);display:none;}
  .explain.show{display:block;animation:fade .25s ease;}
  .explain b{color:var(--text);font-weight:600;}
  @keyframes fade{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:none}}

  /* result */
  .result{background:linear-gradient(160deg,var(--panel),var(--ink-2));border:1px solid var(--line-2);
    border-radius:18px;padding:30px 22px;text-align:center;margin-top:8px;display:none;}
  .result.show{display:block;animation:fade .3s ease;}
  .result .verdict{font-family:var(--mono);font-size:14px;letter-spacing:.14em;text-transform:uppercase;margin-bottom:8px;}
  .result.pass .verdict{color:var(--good);}
  .result.fail .verdict{color:var(--gold);}
  .result .big{font-family:var(--mono);font-size:56px;font-weight:700;line-height:1;margin:6px 0;}
  .result .detail{color:var(--muted);font-size:15px;margin-bottom:20px;}
  .result .actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
  .btn{font-family:var(--mono);font-size:14px;padding:12px 20px;border-radius:11px;border:1px solid var(--line-2);
    background:var(--panel-2);color:var(--text);cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:8px;transition:.15s;}
  .btn:active{transform:scale(.97);}
  .btn.primary{background:var(--accent-2);border-color:var(--accent);color:#04121c;font-weight:700;}

  .submit-row{margin-top:8px;text-align:center;}
  .submit-btn{font-family:var(--mono);font-size:15px;font-weight:700;padding:15px 30px;border-radius:13px;
    border:1px solid var(--accent);background:var(--accent-2);color:#04121c;cursor:pointer;transition:.15s;width:100%;max-width:340px;}
  .submit-btn:disabled{opacity:.4;cursor:not-allowed;}
  .submit-btn:not(:disabled):active{transform:scale(.98);}
  .hint{font-family:var(--mono);font-size:12.5px;color:var(--faint);margin-top:12px;}

  @media(min-width:768px){
    .wrap{padding:34px 26px 110px;}
    .q{padding:24px 24px;}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <a class="back" href="index.html">&larr; All lectures</a>
    <span class="eyebrow">Lecture 05 · Molecular Genetics</span>
  </div>
  <h1>Translation</h1>
  <p class="sub">Ribosomes, tRNA charging, the A/P/E sites, initiation through termination, and posttranslational modification. Tap an answer to lock it in and see instant feedback.</p>

  <div class="progress-wrap">
    <div class="progress-card">
      <span class="progress-meta"><b id="answered">0</b>/<span id="total">0</span> answered</span>
      <div class="bar"><i id="barfill"></i></div>
      <span class="score-pill" id="scorepill">0 correct</span>
    </div>
  </div>

  <div id="quiz"></div>

  <div class="submit-row" id="submitRow">
    <button class="submit-btn" id="submitBtn" disabled>Finish &amp; see score</button>
    <div class="hint" id="hint">Answer all questions to finish</div>
  </div>

  <div class="result" id="result">
    <div class="verdict" id="verdict"></div>
    <div class="big" id="bigscore"></div>
    <div class="detail" id="resultDetail"></div>
    <div class="actions">
      <button class="btn primary" onclick="retry()">Try again</button>
      <a class="btn" href="index.html">Back to lectures</a>
    </div>
  </div>
</div>

<script>
/* ===== Question bank =====
   answer = index of correct option. Options are shuffled at render so position carries no signal. */
const QUESTIONS = [
  {
    "q": "Where in the cell does translation occur, and what brings amino acids to the site?",
    "options": [
      "On ribosomes in the cytoplasm; tRNA delivers the amino acids",
      "In the nucleus; mRNA delivers the amino acids",
      "On the rough ER only; rRNA delivers the amino acids",
      "In the mitochondria; snRNPs deliver the amino acids"
    ],
    "answer": 0,
    "e": "Translation occurs on ribosomes in the cytoplasm, with tRNA molecules carrying amino acids to the ribosome for assembly into protein."
  },
  {
    "q": "Prokaryotic ribosomes are which size, and made of which subunits?",
    "options": [
      "70S, with 30S and 50S subunits",
      "80S, with 40S and 60S subunits",
      "70S, with 40S and 60S subunits",
      "80S, with 30S and 50S subunits"
    ],
    "answer": 0,
    "e": "Prokaryotes have 70S ribosomes (30S small + 50S large); eukaryotes have 80S (40S + 60S). Sizes are in Svedberg (sedimentation) units."
  },
  {
    "q": "Eukaryotic ribosomes are which size, and made of which subunits?",
    "options": [
      "80S, with 40S and 60S subunits",
      "70S, with 30S and 50S subunits",
      "80S, with 30S and 50S subunits",
      "70S, with 40S and 60S subunits"
    ],
    "answer": 0,
    "e": "Eukaryotic ribosomes are 80S (40S small + 60S large). Note the subunit sizes don't add up arithmetically because Svedberg units aren't additive."
  },
  {
    "q": "Why do many antibiotics (e.g. aminoglycosides) selectively target bacterial ribosomes?",
    "options": [
      "Bacterial 70S ribosomes differ from human 80S ribosomes, allowing selective inhibition",
      "Bacteria lack ribosomes entirely",
      "Human ribosomes are also 70S but protected",
      "Antibiotics block the bacterial nucleus"
    ],
    "answer": 0,
    "e": "The structural differences between 70S (bacterial) and 80S (human) ribosomes let protein-synthesis inhibitors act on bacteria while sparing host cells."
  },
  {
    "q": "What is the function of the anticodon on a tRNA?",
    "options": [
      "It base-pairs with the complementary mRNA codon to ensure the correct amino acid is added",
      "It attaches the amino acid to the tRNA",
      "It binds the ribosome's E-site",
      "It signals termination of translation"
    ],
    "answer": 0,
    "e": "The anticodon is a 3-nucleotide sequence that pairs with the mRNA codon, matching each amino acid to the correct position."
  },
  {
    "q": "The 3' end of every tRNA ends in which sequence, and what attaches there?",
    "options": [
      "CCA; the amino acid attaches to the hydroxyl of the terminal A",
      "GU; the anticodon attaches there",
      "AAUAAA; the poly-A tail attaches there",
      "TATA; a transcription factor binds there"
    ],
    "answer": 0,
    "e": "All tRNAs end in CCA at the 3' end; the amino acid is linked via the hydroxyl of the terminal adenosine."
  },
  {
    "q": "'Charging' a tRNA refers to:",
    "options": [
      "Linking the correct amino acid to the tRNA, catalyzed by aminoacyl-tRNA synthetase using ATP",
      "Adding a phosphate group to activate the ribosome",
      "Base-pairing the anticodon with the codon",
      "Removing the initiator methionine"
    ],
    "answer": 0,
    "e": "Charging attaches one specific amino acid to its tRNA. Aminoacyl-tRNA synthetase catalyzes this, requiring ATP; typically one enzyme exists per amino acid."
  },
  {
    "q": "How does aminoacyl-tRNA synthetase improve the accuracy of charging?",
    "options": [
      "Through hydrolytic editing — it hydrolyzes off an incorrectly attached amino acid",
      "By proofreading the mRNA codon before charging",
      "By removing damaged bases from the tRNA",
      "By adding a 5' cap to the tRNA"
    ],
    "answer": 0,
    "e": "Because many amino acids are structurally similar, the synthetase scrutinizes the attached amino acid and hydrolyzes it off if incorrect, increasing fidelity."
  },
  {
    "q": "A ribosome has three tRNA binding sites. What does each do?",
    "options": [
      "A-site accepts the incoming charged tRNA; P-site holds the growing chain; E-site is the exit",
      "A-site holds the growing chain; P-site is the exit; E-site accepts new tRNA",
      "A-site is the exit; P-site accepts new tRNA; E-site holds the chain",
      "All three sites hold identical charged tRNAs simultaneously"
    ],
    "answer": 0,
    "e": "Charged tRNA enters the A-site, the peptidyl (growing) chain sits at the P-site, and the spent tRNA leaves via the E-site (exit)."
  },
  {
    "q": "Translation initiation begins at which codon, coding for which amino acid?",
    "options": [
      "AUG, coding for methionine (or fMet in bacteria)",
      "UAA, coding for a stop signal",
      "GUG, coding for valine",
      "AAA, coding for lysine"
    ],
    "answer": 0,
    "e": "The start codon AUG codes for methionine (N-formylmethionine, fMet, in prokaryotes), which binds directly to the P-site to begin translation."
  },
  {
    "q": "In prokaryotes, fMet released from proteins has what additional immune role?",
    "options": [
      "It acts as a chemotactic signal that attracts neutrophils",
      "It stimulates antibody production directly",
      "It inhibits complement activation",
      "It serves as an antigen for T cells"
    ],
    "answer": 0,
    "e": "N-formylmethionine, characteristic of bacterial protein synthesis, is chemotactic for neutrophils — part of innate immune recognition of bacteria."
  },
  {
    "q": "Peptide bond formation during elongation is catalyzed by:",
    "options": [
      "Peptidyl transferase, a ribozyme made of rRNA in the large subunit",
      "An elongation factor protein in the small subunit",
      "Aminoacyl-tRNA synthetase",
      "A DNA-templated polymerase"
    ],
    "answer": 0,
    "e": "The ribosome itself is the catalyst — peptidyl transferase activity resides in the large-subunit rRNA, making it a ribozyme."
  },
  {
    "q": "During which step of elongation does the ribosome move along the mRNA toward the 3' end?",
    "options": [
      "Translocation, which shifts the growing peptide to the P-site",
      "Initiation, before the first peptide bond",
      "Charging of the tRNA",
      "Termination at the stop codon"
    ],
    "answer": 0,
    "e": "Translocation moves the ribosome one codon toward the 3' end, shifting the peptidyl-tRNA into the P-site so the next codon can be read."
  },
  {
    "q": "Proteins are synthesized by adding new amino acids to which end of the growing chain?",
    "options": [
      "The C-terminal end",
      "The N-terminal end",
      "Either end, alternating",
      "The internal residues first"
    ],
    "answer": 0,
    "e": "Synthesis proceeds from the N-terminus toward the C-terminus, with each new residue added to the C-terminal end of the chain."
  },
  {
    "q": "Elongation factors (EF-Tu/EF-G in bacteria, EF1/EF2 in eukaryotes) function by:",
    "options": [
      "Hydrolyzing GTP to power the steps of elongation",
      "Hydrolyzing ATP to charge tRNAs",
      "Forming peptide bonds directly",
      "Splicing the mRNA during translation"
    ],
    "answer": 0,
    "e": "Elongation factors hydrolyze GTP to GDP to drive tRNA delivery and translocation during the elongation cycle."
  },
  {
    "q": "Diphtheria toxin and Pseudomonas exotoxin A inhibit protein synthesis by targeting:",
    "options": [
      "EF-2 (elongation factor 2)",
      "The 5' cap of mRNA",
      "Aminoacyl-tRNA synthetase",
      "The ribosomal A-site tRNA"
    ],
    "answer": 0,
    "e": "Both toxins inactivate EF-2, halting the translocation step of elongation and thereby blocking protein synthesis."
  },
  {
    "q": "How is translation terminated?",
    "options": [
      "A stop codon is reached and releasing factors catalyze addition of water to free the protein",
      "A tRNA reads the stop codon and adds a final amino acid",
      "The ribosome runs off the 5' cap",
      "Peptidyl transferase adds a poly-A tail to the protein"
    ],
    "answer": 0,
    "e": "Stop codons (UAA, UAG, UGA) aren't read by tRNA; releasing factors bind and catalyze hydrolysis, releasing the completed protein."
  },
  {
    "q": "Which posttranslational modification is essential for proper collagen synthesis?",
    "options": [
      "Hydroxylation of proline and lysine residues",
      "Phosphorylation of serine residues",
      "Ubiquitination of the N-terminus",
      "Methylation of the C-terminus"
    ],
    "answer": 0,
    "e": "Hydroxylation adds OH groups to proline and lysine residues, a step critical for stable collagen formation."
  },
  {
    "q": "Ubiquitination of a protein serves what purpose?",
    "options": [
      "It tags the protein for destruction in the proteasome",
      "It adds a sugar chain to form a glycoprotein",
      "It phosphorylates the protein to activate it",
      "It folds the protein into its final shape"
    ],
    "answer": 0,
    "e": "Adding ubiquitin (a small protein) marks a target protein for degradation by the proteasome."
  },
  {
    "q": "Glycosylation as a posttranslational modification produces:",
    "options": [
      "Glycoproteins, via sugar–amino acid linkages",
      "Phosphoproteins, via phosphate addition",
      "Truncated proteins, via early cleavage",
      "Collagen, via hydroxyl addition"
    ],
    "answer": 0,
    "e": "Glycosylation forms sugar–amino acid linkages (N-, O-, or C-linked), creating glycoproteins."
  },
  {
    "q": "What is the role of chaperone proteins such as heat shock proteins?",
    "options": [
      "They bind other proteins to ensure proper folding and stabilize them under stress",
      "They cleave misfolded proteins for disposal",
      "They transcribe stress-response genes",
      "They add amino acids to elongating chains"
    ],
    "answer": 0,
    "e": "Chaperones (e.g. heat shock proteins) facilitate correct folding and maintain protein structure, and their expression rises under heat, pH shifts, or hypoxia."
  },
  {
    "q": "tRNA is synthesized by which enzyme?",
    "options": [
      "RNA polymerase III",
      "RNA polymerase I",
      "RNA polymerase II",
      "DNA polymerase δ"
    ],
    "answer": 0,
    "e": "In eukaryotes, RNA polymerase III transcribes tRNA (and 5S rRNA and other small RNAs)."
  },
  {
    "q": "The overall order of the three stages of protein synthesis is:",
    "options": [
      "Initiation, elongation, termination",
      "Elongation, initiation, termination",
      "Termination, elongation, initiation",
      "Initiation, termination, elongation"
    ],
    "answer": 0,
    "e": "Translation proceeds through initiation (assembly at the start codon), elongation (chain growth), and termination (release at the stop codon)."
  },
  {
    "q": "Aminoacyl-tRNA synthetase specificity in most eukaryotic cells is organized how?",
    "options": [
      "One enzyme per amino acid, attaching it to the correct tRNA",
      "One enzyme for all twenty amino acids",
      "One enzyme per codon",
      "One enzyme per ribosomal subunit"
    ],
    "answer": 0,
    "e": "There is generally one aminoacyl-tRNA synthetase per amino acid, each responsible for charging the appropriate tRNA (e.g. one enzyme attaches glycine)."
  }
];
</script>

<script>
/* ===== Quiz engine ===== */
(function(){
  const bank = QUESTIONS.map(q=>({...q}));
  const quizEl = document.getElementById('quiz');
  const totalEl = document.getElementById('total');
  const answeredEl = document.getElementById('answered');
  const scorepillEl = document.getElementById('scorepill');
  const barfill = document.getElementById('barfill');
  const submitBtn = document.getElementById('submitBtn');
  const submitRow = document.getElementById('submitRow');
  const hint = document.getElementById('hint');
  const resultEl = document.getElementById('result');
  const LETTERS = ['A','B','C','D','E','F'];
  const PASS = 70;

  let state = [];

  function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

  function build(){
    quizEl.innerHTML='';
    state = bank.map(()=>({answered:false,correct:false}));
    totalEl.textContent = bank.length;

    bank.forEach((item,qi)=>{
      // shuffle options, track correct index
      const order = shuffle(item.options.map((t,idx)=>({t,idx})));
      const correctPos = order.findIndex(o=>o.idx===item.answer);

      const card = document.createElement('div');
      card.className='q';
      card.id='q'+qi;

      const head = document.createElement('div');
      head.className='q-head';
      head.innerHTML = `<span class="q-num">Q${String(qi+1).padStart(2,'0')}</span><span class="q-text"></span>`;
      head.querySelector('.q-text').textContent = item.q;
      card.appendChild(head);

      const opts = document.createElement('div');
      opts.className='opts';
      order.forEach((o,pos)=>{
        const b = document.createElement('button');
        b.className='opt';
        b.innerHTML = `<span class="tag">${LETTERS[pos]}</span><span class="txt"></span><span class="mark"></span>`;
        b.querySelector('.txt').textContent = o.t;
        b.addEventListener('click',()=>choose(qi,pos,correctPos,opts,exp));
        opts.appendChild(b);
      });
      card.appendChild(opts);

      const exp = document.createElement('div');
      exp.className='explain';
      exp.innerHTML = `<b>Why:</b> ${item.e}`;
      card.appendChild(exp);

      quizEl.appendChild(card);
    });
    update();
  }

  function choose(qi,pos,correctPos,optsEl,expEl){
    if(state[qi].answered) return;
    state[qi].answered=true;
    state[qi].correct = (pos===correctPos);
    const buttons=[...optsEl.children];
    buttons.forEach((b,i)=>{
      b.disabled=true;
      if(i===correctPos){b.classList.add('correct');b.querySelector('.mark').textContent='✓';}
      if(i===pos && pos!==correctPos){b.classList.add('wrong');b.querySelector('.mark').textContent='✗';}
    });
    expEl.classList.add('show');
    update();
  }

  function update(){
    const answered = state.filter(s=>s.answered).length;
    const correct = state.filter(s=>s.correct).length;
    answeredEl.textContent = answered;
    scorepillEl.textContent = correct+' correct';
    barfill.style.width = (answered/bank.length*100)+'%';
    const done = answered===bank.length;
    submitBtn.disabled = !done;
    hint.textContent = done ? 'All answered — lock in your score' : (bank.length-answered)+' left';
  }

  submitBtn.addEventListener('click',()=>{
    const correct = state.filter(s=>s.correct).length;
    const pct = Math.round(correct/bank.length*100);
    const pass = pct>=PASS;
    resultEl.className='result show '+(pass?'pass':'fail');
    document.getElementById('verdict').textContent = pass?'Pass':'Keep reviewing';
    document.getElementById('bigscore').textContent = pct+'%';
    document.getElementById('resultDetail').textContent =
      `${correct} of ${bank.length} correct · passing mark is ${PASS}%`;
    submitRow.style.display='none';
    resultEl.scrollIntoView({behavior:'smooth',block:'center'});
  });

  window.retry=function(){
    resultEl.className='result';
    submitRow.style.display='';
    build();
    window.scrollTo({top:0,behavior:'smooth'});
  };

  build();
})();
